<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
    </style>

    <script>
      AFRAME.registerComponent('video-handler', {
        init: function () {
          const video = document.querySelector("#videomarian");
          
          // Reproducir cuando se detecta el target
          this.el.addEventListener('targetFound', () => {
            video.play();
          });

          // Pausar cuando se pierde el target
          this.el.addEventListener('targetLost', () => {
            video.pause();
          });
        }
      });

      // Mantenemos tu efecto de parpadeo para el objeto 3D
      AFRAME.registerComponent('holographic-blink', {
        tick: function (t) {
          const mesh = this.el.getObject3D('mesh');
          if (mesh) {
            const flicker = Math.abs(Math.sin(t / 30)) * 0.1 + 0.002; 
            mesh.traverse((node) => {
              if (node.isMesh) {
                node.material.transparent = true;
                node.material.opacity = flicker;
              }
            });
          }
        }
      });
    </script>
  </head>
  <body>
    <a-scene 
      mindar-image="imageTargetSrc: ./target.mind;" 
      video-handler
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights: true" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="psyduckModel" src="./basecartaar.glb"></a-asset-item>
        <video id="videomarian" src="./videomarian.mp4" 
               preload="auto" loop="true" crossorigin="anonymous" 
               webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-gltf-model 
          src="#psyduckModel" 
          holographic-blink
          rotation="0 0 0" 
          position="0 0 0" 
          scale="0.20 0.20 0.09">
        </a-gltf-model>

        <a-video 
          src="#videomarian" 
          width="1" 
          height="1.7" 
          position="0 0 0.35" 
          rotation="0 0 0"
          material="shader: flat; blending: additive; transparent: true; opacity: 0.9">
        </a-video>

      </a-entity>
      
    </a-scene>
  </body>
</html>
