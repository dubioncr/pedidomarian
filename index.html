<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #ui {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8); color: white;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        z-index: 9999; font-family: sans-serif;
      }
      #startBtn {
        padding: 15px 30px; font-size: 18px; cursor: pointer;
        background: #00e5ff; border: none; border-radius: 5px; font-weight: bold;
      }
    </style>

    <script>
      AFRAME.registerComponent('video-handler', {
        init: function () {
          const video = document.querySelector("#videomarian");
          const btn = document.querySelector("#startBtn");

          btn.addEventListener('click', () => {
            video.muted = false;
            video.play(); // Play inicial para "despertar" el video
            video.pause(); // Pausa inmediata hasta encontrar el target
            document.querySelector("#ui").style.display = "none";
          });
          
          this.el.addEventListener('targetFound', () => {
            video.play();
          });

          this.el.addEventListener('targetLost', () => {
            video.pause();
          });
        }
      });

      AFRAME.registerComponent('holographic-blink', {
        tick: function (t) {
          const mesh = this.el.getObject3D('mesh');
          if (mesh) {
            // Bajamos un poco la frecuencia del tick para móviles
            const flicker = Math.abs(Math.sin(t / 40)) * 0.1 + 0.005; 
            mesh.traverse((node) => {
              if (node.isMesh) {
                node.material.transparent = true;
                node.material.opacity = flicker;
              }
            });
          }
        }
      });
    </script>
  </head>
  <body>
    <div id="ui">
      <button id="startBtn">ACTIVAR AUDIO Y CAMARA</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./target.mind; autoStart: true; maxTrack: 1;" 
      renderer="colorManagement: true, antialias: false, precision: mediump"
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="psyduckModel" src="./basecartaar.glb"></a-asset-item>
        <video id="videomarian" src="./videomarian.mp4" 
               preload="auto" loop="true" crossorigin="anonymous" 
               webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" video-handler>
        <a-gltf-model 
          src="#psyduckModel" 
          holographic-blink
          rotation="0 0 0" 
          position="0 0 0" 
          scale="0.20 0.20 0.09">
        </a-gltf-model>

        <a-video 
          src="#videomarian" 
          width="1" 
          height="1.7" 
          position="0 0 0.35" 
          material="shader: flat; blending: additive; transparent: true; opacity: 0.9">
        </a-video>
      </a-entity>
    </a-scene>
  </body>
</html>
